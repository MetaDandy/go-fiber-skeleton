services:
  mailpit:
    image: axllent/mailpit:latest
    container_name: go-fiber-mailpit
    ports:
      - "1025:1025"    # SMTP (tu app conecta aquí)
      - "8025:8025"    # Web UI (accedes en navegador)
    environment:
      - MP_SMTP_AUTH_ACCEPT_ANY=true         # Acepta cualquier credencial
      - MP_SMTP_AUTH_ALLOW_INSECURE=true     # Permite sin TLS en dev
      - MP_MAX_MESSAGES=500                   # Guardar últimos 500 emails
    volumes:
      - mailpit_data:/data
    networks:
      - mail-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8025"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  mailpit_data:

networks:
  mail-network:
    driver: bridge
